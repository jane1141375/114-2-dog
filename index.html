<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐾 好想把狗勾帶回家！</title>
  <link rel="stylesheet" href="style.css?v=12" />
</head>

<body>
  <div class="emoji-background" aria-hidden="true"></div>
  <main class="page">
    <div class="paw-row" aria-hidden="true">
      <span>❤️</span> 
    </div>

    <div class="page-header">
      <h1 class="title">🐾 好想把狗勾帶回家！</h1>
      <div class="header-buttons">
        <button id="adoptionHouseBtn" class="adoption-house-button" type="button" aria-label="查看家裡的小狗">🏠</button>
        <button id="statsBtn" class="stats-button" type="button" aria-label="查看遊玩紀錄">📊</button>
      </div>
    </div>

    <p class="subtitle">
      開啟鏡頭後，系統會使用 Teachable Machine 偵測畫面中的狗狗。偵測到狗狗後，可以點擊互動按鈕開始小遊戲。
    </p>

    <button id="cameraToggle" class="camera-button" type="button">開啟鏡頭</button>

    <div class="frame-wrap">
      <div id="previewBox" class="preview-box" aria-label="鏡頭畫面預留區">
        <video id="cameraFeed" autoplay playsinline muted></video>
        <div id="triggerBadge" class="trigger-badge">🐶 發現狗狗！點擊開始互動！</div>
        <button id="cameraFlipBtn" class="camera-flip-btn" type="button" aria-label="切換前後鏡頭">↔️</button>
      </div>

      <aside class="result-panel" aria-live="polite">
        <p class="result-title">目前偵測結果</p>
        <p id="resultLabel" class="result-label">not_dog</p>
        <p id="resultConfidence" class="result-confidence">0%</p>
        <p id="statusText" class="result-status">等待載入模型</p>
      </aside>
    </div>
  </main>

  <div id="gameOverlay" class="game-overlay" aria-hidden="true">
    <section class="game-card" role="dialog" aria-modal="true" aria-labelledby="gameTitle">
      <button id="gameClose" class="game-close" type="button" aria-label="關閉遊戲視窗">✕</button>

      <p id="gameTitle" class="game-title">🐾 狗狗互動小遊戲</p>

      <div class="dog-visual-stack">
        <div class="real-dog-wrap">
          <img id="realDogPhoto" class="real-dog-photo" alt="實體偵測截圖" />
          <div id="dogEmoji" class="dog-emoji mood-badge" aria-hidden="true">🐶</div>
        </div>
        <div id="affectionDelta" class="affection-delta" aria-hidden="true"></div>
      </div>

      <div class="progress-wrap">
        <div class="progress-label-row">
          <span>好感度</span>
          <span id="affectionValue">20%</span> 
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-item">
          <span>狗狗飽足值</span>
          <strong id="satietyValue">50%</strong>
          <div class="progress-track" aria-hidden="true">
            <div id="satietyFill" class="progress-fill"></div>
          </div>
        </div>
        <div class="stat-item">
          <span>狗狗體力值</span>
          <strong id="energyValue">80%</strong>
          <div class="progress-track" aria-hidden="true">
            <div id="energyFill" class="progress-fill"></div>
          </div>
        </div>
      </div>

      <p id="gameStatus" class="game-status">狗狗正在等你陪牠玩喔！</p>

      <div class="game-actions">
        <button class="game-btn" data-action="feed" type="button">🍖 餵食</button>
        <button class="game-btn" data-action="music" type="button">🎵 聽歌</button>
        <button class="game-btn" data-action="pet" type="button">🤚 摸摸</button>
        <button class="game-btn" data-action="play" type="button">🥎 玩耍</button>
      </div>
    </section>
  </div>

  <div id="pianoOverlay" class="game-overlay" aria-hidden="true">
    <section class="piano-card game-card" role="dialog" aria-modal="true" aria-labelledby="pianoTitle">
      <button id="pianoClose" class="game-close" type="button" aria-label="關閉鋼琴模式">✕</button>
      <p id="pianoTitle" class="game-title">🎹 鋼琴模式</p>
      <p class="piano-instructions">彈奏琴鍵讓狗狗聽你演奏，完成後點擊離開。</p>
      <div class="score-sheet-panel">
        <div class="score-sheet-buttons">
          <button class="score-sheet-btn" type="button" data-song="mary">瑪莉有隻小綿羊</button>
          <button class="score-sheet-btn" type="button" data-song="twinkle">小星星</button>
          <button class="score-sheet-btn" type="button" data-song="bee">小蜜蜂</button>
        </div>
        <div id="scoreSheet" class="score-sheet" aria-live="polite">
          <p class="score-sheet-title">數字簡譜</p>
          <pre id="scoreSheetContent" class="score-sheet-content">選擇一首曲子查看簡譜。</pre>
        </div>
      </div>
      <div class="piano-keys">
        <button class="piano-key" data-note="C" type="button">C</button>
        <button class="piano-key" data-note="D" type="button">D</button>
        <button class="piano-key" data-note="E" type="button">E</button>
        <button class="piano-key" data-note="F" type="button">F</button>
        <button class="piano-key" data-note="G" type="button">G</button>
        <button class="piano-key" data-note="A" type="button">A</button>
        <button class="piano-key" data-note="B" type="button">B</button>
      </div>
      <p id="pianoFeedback" class="piano-feedback">開始彈奏一段輕快的旋律吧！</p>
      <button id="pianoDone" class="piano-done" type="button">離開鋼琴模式</button>
    </section>
  </div>

  <div id="adoptionHouseOverlay" class="game-overlay" aria-hidden="true">
    <section class="adoption-house-card game-card" role="dialog" aria-modal="true" aria-labelledby="adoptionTitle">
      <button id="adoptionClose" class="game-close" type="button" aria-label="關閉家裡的小狗視窗">✕</button>
      <p id="adoptionTitle" class="game-title">🏠 家裡的小狗</p>
      <div id="adoptedDogsContainer" class="adopted-dogs-container">
        <p class="empty-message">你還沒有帶回家任何狗狗呢，加油！</p>
      </div>
      <div id="adoptionPagination" class="adoption-pagination" aria-label="家裡的小狗分頁"></div>
    </section>
  </div>

  <div id="adoptionToast" class="adoption-toast" aria-live="polite" aria-atomic="true">
    <div class="toast-content">
      <p id="adoptionToastMessage">恭喜！狗狗已加入收養紀錄</p>
      <div class="heart-burst" aria-hidden="true"></div>
    </div>
  </div>

  <div id="statsOverlay" class="game-overlay" aria-hidden="true">
    <section class="stats-card game-card" role="dialog" aria-modal="true" aria-labelledby="statsTitle">
      <button id="statsClose" class="game-close" type="button" aria-label="關閉統計視窗">✕</button>
      <button id="statsReset" class="stats-reset-btn" type="button" aria-label="重置統計">重置</button>
      <p id="statsTitle" class="game-title">📋 遊玩紀錄</p>
      <canvas id="statsCanvas" width="420" height="1" aria-hidden="true" style="display:none"></canvas>
      <div id="statsCounts" class="stats-counts record-list"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <script src="ai.js?v=4"></script>
  <script src="game.js?v=4"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
